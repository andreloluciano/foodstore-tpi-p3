<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="../store.css">
</head>
<body>
  <header>
    <h1>Geek Food Store</h1>
    <nav>
      <ul>
        <li><a href="/src/pages/store/home/home.html">Catálogo</a></li>
      </ul>
    </nav>
  </header>
  <main>

    <h1>Carrito</h1>

    <!-- contenedor para los productos --> 
    <div id="cart-container"></div>

    <!-- precio total -->
    <h2 id="total"></h2>

    <!-- botón vaciar carrito -->
    <button id="clearCart">Vaciar carrito</button>

    <section id="checkout">
  <h2>Finalizar compra</h2>

  <label for="telefono">Telefono:</label>
  <input type="text" id="telefono" placeholder="Ej: 3434567890">

  <label for="formaPago">Forma de pago:</label>
  <select id="formaPago">
    <option value="">Seleccionar forma de pago</option>
    <option value="EFECTIVO">Efectivo</option>
    <option value="TARJETA">Tarjeta</option>
    <option value="TRANSFERENCIA">Transferencia</option>
  </select>

  <button id="confirmarPedido">Confirmar pedido</button>
</section>

    <br><br>

  </main>

  <script type="module" src="./cart.ts"></script>

</body>
</html>
