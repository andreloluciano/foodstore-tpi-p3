<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geek Food Store</title>
    <link rel="stylesheet" href="../store.css">
</head>
<body>
<div id="mensaje-toast"></div>
<header>
    <a href="/src/pages/store/home/home.html" class="logo-link"><h1>Geek Food Store</h1></a>
    

    <nav>
  <a href="/src/pages/store/cart/cart.html">Carrito</a>
  <a href="/src/pages/client/orders/orders.html" id="misPedidosLink">Mis pedidos</a>

  <button id="logoutButton">Logout</button>

  <a href="/src/pages/admin/home/home.html" id="adminLink">Panel Admin</a>
</nav>
</header>
<hr>
<aside>
    <h2>Categorías</h2>
    <ul id="lista-categorias"></ul> 
</aside>

<main>
    <section>
        <label for="buscar">Buscar productos:</label>
        <input type="text" id="buscar" placeholder="Ej: Hamburguesa">
    </section>

    <label for="ordenar">Ordenar por:</label>
<select id="ordenar">
  <option value="">Sin ordenar</option>
  <option value="nombre-asc">Nombre A-Z</option>
  <option value="nombre-desc">Nombre Z-A</option>
  <option value="precio-asc">Precio menor a mayor</option>
  <option value="precio-desc">Precio mayor a menor</option>
</select>

    <p id="contador-productos"></p>
    <section id="contenedor-productos">
        <h2>Productos</h2>
    </section>
</main>

<footer>
    <h3>Información Adicional</h3>
    <p>Ubicación: Buenos Aires, Argentina.</p>

</footer>
