<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Create Account</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="container">
        <form id="registroForm" class="registroForm">
            <h1>FOOD STORE</h1>
            <h2>Crear Cuenta</h2>

            <label for="email">Email:</label>
            <input 
                type="email" 
                id="email"  
                name="email" 
                placeholder="tucorreo@ejemplo.com" 
                required>
                
            <label for="password">Contraseña:</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Mínimo 8 caracteres" 
                required>

            <button type="submit">Registrarse</button>

            <p class="registro">
                ¿Ya tenés cuenta? <a href="../login/login.html">Ingresá acá</a>
            </p>
        </form>
    </div>
    <script type="module" src="./registro.ts"></script>
</body>
</html>
